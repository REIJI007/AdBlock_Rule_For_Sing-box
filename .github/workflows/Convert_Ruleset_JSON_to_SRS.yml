# 工作流程名称
name: Convert_Ruleset_JSON_to_SRS

# 触发条件
on:
  schedule:
    - cron: '*/20 * * * *'  # 每20分钟运行一次
  workflow_dispatch:  # 允许手动触发

# 定义作业
jobs:
  update-and-convert:
    runs-on: windows-latest  # 使用 Windows 运行环境

    steps:
      # 步骤1：检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v2

      # 步骤2：下载并解压 sing-box
      - name: Download and Extract sing-box v1.9.4
        shell: powershell
        run: |
          $exePath = "./sing-box.exe"  # 定义 sing-box.exe 的路径
          
          if (-not (Test-Path $exePath)) {
            Write-Host "sing-box.exe not found, downloading..."
            $url = "https://github.com/SagerNet/sing-box/releases/download/v1.9.4/sing-box-1.9.4-windows-amd64.zip"
            $zipFile = "sing-box.zip"
            
            Invoke-WebRequest -Uri $url -OutFile $zipFile -TimeoutSec 300  # 下载 ZIP 文件
            Expand-Archive -Path $zipFile -DestinationPath . -Force  # 解压 ZIP 文件
            Remove-Item -Path $zipFile  # 删除 ZIP 文件
            Write-Host "Download and extraction complete!"
          } else {
            Write-Host "sing-box.exe already exists."
          }

      # 步骤3：转换规则集
      - name: Convert ruleset
        shell: powershell
        run: |
          $exePath = "./sing-box.exe"  # 定义 sing-box.exe 的路径
          
          if (Test-Path $exePath) {
            Write-Host "Sing-box version:"
            & $exePath -v  # 输出 sing-box 版本

            Write-Host "Attempting conversion..."
            & $exePath rule-set compile adblock_reject_domain.json --output adblock_reject_domain.srs  # 编译 JSON 文件
            
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Conversion successful!"
            } else {
              Write-Host "Conversion failed with exit code $LASTEXITCODE"
              exit 1
            }
          } else {
            Write-Host "sing-box.exe not found, skipping conversion step."
            exit 1
          }

      # 步骤4：提交并推送更改
      - name: Push changes
        shell: powershell
        env:
          TOKEN: ${{ secrets.TOKEN }}  # 从 GitHub Secrets 中获取 TOKEN
        run: |
          git config user.email "action@github.com"  # 配置 Git 用户邮箱
          git config user.name "GitHub Action"  # 配置 Git 用户名
          
          git add adblock_reject_domain.srs sing-box.exe  # 添加转换后的文件和 sing-box.exe 到 Git
          
          if (git status --porcelain) {
            git commit -m "Update adblock_reject_domain.srs and add sing-box.exe"  # 如果有更改，进行提交
            
            Write-Host "Pushing changes..."
            git push https://${{ secrets.TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }} --force  # 强制推送更改
          } else {
            Write-Host "No changes to commit."
          }
