name: Convert_Ruleset_JSON_to_SRS

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  update-and-convert:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Check and download / replace sing-box if needed
        shell: powershell
        run: |
          $exePath = "./sing-box.exe"
          $markerPath = "./.sing-box_downloaded"
          $zipFile = "sing-box.zip"
          $tempDir = "singbox_tmp"
          $maxAttempts = 5

          Write-Host "Querying latest release info from GitHub..."
          try {
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/SagerNet/sing-box/releases/latest" -Headers @{ 'User-Agent' = 'PowerShell' }
          } catch {
            Write-Host "Failed to query latest release: $_"
            exit 1
          }

          $asset = $release.assets | Where-Object { $_.name -like "*windows-amd64.zip" } | Select-Object -First 1
          if (-not $asset) {
            Write-Host "No windows-amd64 asset found in latest release."
            exit 1
          }

          $downloadUrl = $asset.browser_download_url
          # Normalize tag -> version string like 1.2.3
          $latestVersionString = ($release.tag_name -replace '[^0-9\.]', '')
          try {
            $latestVersion = [version]$latestVersionString
          } catch {
            $latestVersion = [version]"0.0.0"
          }

          # function: parse semver from sing-box -v output
          function GetExeVersion([string]$path) {
            if (-not (Test-Path $path)) { return [version]"0.0.0" }
            try {
              $out = & $path -v 2>&1
              $m = [regex]::Match($out, '([0-9]+\.[0-9]+\.[0-9]+)')
              if ($m.Success) { return [version]$m.Groups[1].Value }
            } catch {
              Write-Host "Failed to run $path to get version: $_"
            }
            return [version]"0.0.0"
          }

          $existingVersion = GetExeVersion $exePath
          Write-Host "Existing sing-box version: $existingVersion"
          Write-Host "Latest release version: $latestVersion"

          $needDownload = $false
          if (-not (Test-Path $exePath)) {
            Write-Host "sing-box.exe not found locally -> will download"
            $needDownload = $true
          } elseif (-not (Test-Path $markerPath)) {
            Write-Host ".sing-box_downloaded marker not found -> will download to ensure correct version"
            $needDownload = $true
          } elseif ($latestVersion -gt $existingVersion) {
            Write-Host "Latest version is newer than existing -> will download and replace"
            $needDownload = $true
          } else {
            Write-Host "Local sing-box.exe is up-to-date. No download required."
            $needDownload = $false
          }

          if ($needDownload) {
            $attempt = 0
            while ($attempt -lt $maxAttempts) {
              $attempt++
              try {
                Write-Host "Downloading sing-box (attempt $attempt): $downloadUrl"
                Invoke-WebRequest -Uri $downloadUrl -OutFile $zipFile -TimeoutSec 300

                if (Test-Path $tempDir) { Remove-Item -Path $tempDir -Recurse -Force }
                New-Item -Path $tempDir -ItemType Directory | Out-Null

                Expand-Archive -Path $zipFile -DestinationPath $tempDir -Force
                Remove-Item -Path $zipFile -Force

                $newExe = Get-ChildItem -Path $tempDir -Recurse -Filter "sing-box.exe" | Select-Object -First 1
                if (-not $newExe) {
                  throw "Extracted archive does not contain sing-box.exe"
                }

                $newExePath = $newExe.FullName
                $newVersion = GetExeVersion $newExePath
                Write-Host "New sing-box version found in archive: $newVersion"

                if (Test-Path $exePath) {
                  if ($newVersion -gt $existingVersion) {
                    # backup existing
                    $bakName = "sing-box.exe.bak.$((Get-Date).ToString('yyyyMMddHHmmss'))"
                    Write-Host "Backing up existing sing-box.exe -> $bakName"
                    Rename-Item -Path $exePath -NewName $bakName -Force
                    Copy-Item -Path $newExePath -Destination $exePath -Force
                    Write-Host "Replaced sing-box.exe with version $newVersion"
                  } else {
                    Write-Host "Downloaded version ($newVersion) is not newer than existing ($existingVersion). Skipping replace."
                  }
                } else {
                  Copy-Item -Path $newExePath -Destination $exePath -Force
                  Write-Host "Installed sing-box.exe version $newVersion"
                }

                # cleanup temp and write marker
                if (Test-Path $tempDir) { Remove-Item -Path $tempDir -Recurse -Force }
                Set-Content -Path $markerPath -Value $newVersion.ToString()
                break
              } catch {
                Write-Host "Attempt $attempt failed: $_"
                if ($attempt -ge $maxAttempts) {
                  Write-Host "Max attempts reached, aborting."
                  exit 1
                }
                Start-Sleep -Seconds 10
              }
            }
          }

      - name: Convert ruleset
        shell: powershell
        run: |
          $exePath = "./sing-box.exe"
          
          if (Test-Path $exePath) {
            Write-Host "Sing-box version (sanity):"
            & $exePath -v

            $maxAttempts = 5
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              try {
                Write-Host "Attempting conversion (Attempt $attempt)..."
                & $exePath rule-set compile --output adblock_reject.srs adblock_reject.json
                if ($LASTEXITCODE -eq 0) {
                  Write-Host "Conversion successful!"
                  break
                } else {
                  throw "Conversion failed with exit code $LASTEXITCODE"
                }
              } catch {
                Write-Host "Attempt $attempt failed. Error: $_"
                if ($attempt -eq $maxAttempts) {
                  Write-Host "Max attempts reached. Exiting."
                  exit 1
                }
                Start-Sleep -Seconds 5
              }
            }
          } else {
            Write-Host "sing-box.exe not found, skipping conversion step."
            exit 1
          }

      - name: Push changes
        shell: powershell
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          $maxAttempts = 5
          
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              git config user.email "action@github.com"
              git config user.name "GitHub Action"
              
              git pull https://${{ secrets.TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }} --rebase
              break
            } catch {
              Write-Host "git pull attempt $attempt failed. Error: $_"
              if ($attempt -eq $maxAttempts) {
                Write-Host "Failed to pull changes after $maxAttempts attempts. Exiting."
                exit 1
              }
              Start-Sleep -Seconds 30
            }
          }
          
          git add adblock_reject.srs sing-box.exe .sing-box_downloaded
          
          if (git status --porcelain) {
            git commit -m "Update adblock_reject.srs and add/replace sing-box.exe"
            
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              try {
                Write-Host "Attempting to push changes (Attempt $attempt of $maxAttempts)..."
                git push https://${{ secrets.TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }} --force
                Write-Host "Changes successfully pushed."
                break
              } catch {
                Write-Host "Push attempt $attempt failed. Error: $_"
                if ($attempt -eq $maxAttempts) {
                  Write-Host "Failed to push changes after $maxAttempts attempts. Exiting."
                  exit 1
                }
                Start-Sleep -Seconds 30
              }
            }
          } else {
            Write-Host "No changes to commit."
          }
