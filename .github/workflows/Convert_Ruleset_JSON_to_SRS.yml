# 工作流程名称
name: Convert_Ruleset_JSON_to_SRS

# 触发条件
on:
  schedule:
    - cron: '*/20 * * * *'  # 每20分钟运行一次
  workflow_dispatch:  # 允许手动触发

# 定义作业
jobs:
  update-and-convert:
    runs-on: windows-latest  # 使用 Windows 运行环境

    steps:
      # 步骤1：检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v2

      # 步骤2：下载并解压 sing-box
      - name: Download and extract sing-box v1.9.4
        shell: powershell
        run: |
          $url = "https://github.com/SagerNet/sing-box/releases/download/v1.9.4/sing-box-1.9.4-windows-amd64.zip"
          $zipFile = "sing-box.zip"
          $exePath = "sing-box.exe"
          
          # 下载 ZIP 文件
          Invoke-WebRequest -Uri $url -OutFile $zipFile -TimeoutSec 300
          
          # 解压并重命名 sing-box.exe
          Expand-Archive -Path $zipFile -DestinationPath . -Force
          Remove-Item -Path $zipFile  # 删除 ZIP 文件
          $extractedExe = Get-ChildItem -Recurse -Filter "sing-box*.exe" | Select-Object -First 1
          Rename-Item -Path $extractedExe.FullName -NewName $exePath -Force

      # 步骤3：使用 sing-box 转化规则集
      - name: Convert ruleset
        shell: powershell
        run: |
          $exePath = "./sing-box.exe"
          
          if (Test-Path $exePath) {
            Write-Host "Attempting to compile adblock_reject_domain.json..."
            & $exePath rule-set compile --output adblock_reject_domain.srs adblock_reject_domain.json
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Compilation successful!"
            } else {
              throw "Compilation failed with exit code $LASTEXITCODE"
            }
          } else {
            throw "sing-box.exe not found, skipping conversion step."
          }

      # 步骤4：提交并推送更改
      - name: Push changes
        shell: powershell
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          
          git add adblock_reject_domain.srs sing-box.exe
          
          if (git status --porcelain) {
            git commit -m "Update adblock_reject_domain.srs and add sing-box.exe"
            git push https://${{ secrets.TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }} --force
          } else {
            Write-Host "No changes to commit."
          }
